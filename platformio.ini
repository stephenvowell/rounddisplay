; Seeed Studio Round Display (SKU 104030087) on XIAO ESP32-C3
;
; TFT_eSPI is configured entirely from build flags below (USER_SETUP_LOADED),
; so no library files need to be edited.
;
; Pin mapping (XIAO ESP32-C3 GPIO numbers):
;   D1  = GPIO3  -> LCD CS
;   D3  = GPIO5  -> LCD DC
;   D8  = GPIO8  -> SPI SCK
;   D10 = GPIO10 -> SPI MOSI
;   D6  = GPIO21 -> Backlight
;   D4  = GPIO6  -> I2C SDA (touch + RTC)
;   D5  = GPIO7  -> I2C SCL (touch + RTC)
;   D7  = GPIO20 -> Touch interrupt
;   D2  = GPIO4  -> TF card CS (unused here)

[env:seeed_xiao_esp32c3]
; Pinned to 6.x (Arduino core 2.0.x): TFT_eSPI 2.5.43 crashes on core 3.x
platform = espressif32@^6.9.0
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
; Fixes a TFT_eSPI null-pointer crash on the C3 (see script docstring)
extra_scripts = pre:tools/patch_tft_espi_c3.py
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
build_flags =
    -D USER_SETUP_LOADED=1
    -D GC9A01_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MISO=-1
    -D TFT_MOSI=10
    -D TFT_SCLK=8
    -D TFT_CS=3
    -D TFT_DC=5
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
